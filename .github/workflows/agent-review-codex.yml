name: "Agent: Code Review (Codex)"

on:
  pull_request:
    types:
      - opened
      - synchronize

concurrency:
  group: agent-review-codex-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Record start time
        id: timer
        run: echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Run Codex
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          model: ${{ vars.GH_AW_MODEL_AGENT_CODEX || 'gpt-5.4-mini' }}
          sandbox: workspace-write

      - name: Post review comment
        if: steps.codex.outputs.final-message != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_REVIEW,
            });
        env:
          CODEX_REVIEW: ${{ steps.codex.outputs.final-message }}

      - name: Track with AgentMeter
        if: always()
        uses: foo-software/agentmeter-action@main
        with:
          api_key: ${{ secrets.AGENTMETER_API_KEY }}
          api_url: ${{ vars.AGENTMETER_API_URL || 'https://agentmeter.app' }}
          engine: codex
          model: ${{ vars.GH_AW_MODEL_AGENT_CODEX || 'gpt-5.4-mini' }}
          status: ${{ job.status == 'success' && 'success' || 'failed' }}
          started_at: ${{ steps.timer.outputs.started_at }}
          post_comment: 'true'
